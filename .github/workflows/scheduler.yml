name: Hourly Auto Scheduler

on:
  schedule:
    - cron: '19 * * * *'  # 每小时错峰执行，避开整点高峰
  workflow_dispatch: {}

concurrency:
  group: hourly-auto-scheduler
  cancel-in-progress: true

jobs:
  run-scheduler:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Diagnose CPA DNS
        env:
          UPLOAD_API_URL: ${{ secrets.UPLOAD_API_URL }}
        run: |
          python - <<'PY'
          from urllib.parse import urlparse
          import os

          raw = os.environ.get("UPLOAD_API_URL", "").strip()
          parsed = urlparse(raw)
          print(f"UPLOAD_API_URL set: {'yes' if raw else 'no'}")
          print(f"CPA host: {parsed.hostname or 'missing'}")
          print(f"CPA path: {parsed.path or '/'}")
          PY
          host=$(python - <<'PY'
          from urllib.parse import urlparse
          import os
          print(urlparse(os.environ.get("UPLOAD_API_URL", "")).hostname or "")
          PY
          )
          if [ -n "$host" ]; then
            getent hosts "$host" || nslookup "$host" || true
            curl -I --max-time 15 "https://$host" || true
          fi

      - name: Run auto_scheduler
        env:
          PYTHONUNBUFFERED: 1
          LAMAIL_DOMAIN: ${{ secrets.LAMAIL_DOMAIN }}
          LAMAIL_API_KEY: ${{ secrets.LAMAIL_API_KEY }}
          UPLOAD_API_URL: ${{ secrets.UPLOAD_API_URL }}
          UPLOAD_API_TOKEN: ${{ secrets.UPLOAD_API_TOKEN }}
        run: |
          # 如果系统有 `uv` 命令则使用用户期望的命令，否则降级执行 python
          if command -v uv >/dev/null 2>&1; then
            uv run auto_scheduler.py
          else
            python -u auto_scheduler.py
          fi
